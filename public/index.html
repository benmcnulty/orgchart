<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrgChart</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="header-title">
          <span class="header-logo" aria-hidden="true"></span>
          <h1>OrgChart</h1>
        </div>
        <p class="header-sub">Paper Dolls for Corporate Theater</p>
        <button id="theme-toggle" class="btn-theme" aria-label="Toggle theme"></button>
      </div>
    </header>

    <main class="app-main">
      <!-- Both panels are built and mounted here by app.js -->
      <div id="panel-sources-mount"></div>
      <div id="panel-persona-mount"></div>
      <div id="panel-skills-mount"></div>
      <div id="panel-tools-mount"></div>
      <div id="panel-management-mount"></div>
      <div id="panel-intranet-mount"></div>
      <div id="panel-chat-mount"></div>
      <div id="panel-group-chat-mount"></div>
      <div id="panel-pipeline-mount"></div>
      <div id="panel-tasks-mount"></div>
    </main>

    <!-- Add Source Modal (static HTML — toggled by app.js) -->
    <div id="add-modal" class="modal-backdrop hidden"
         role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal">
        <h3 id="modal-title" class="modal-title">Add Inference Source</h3>
        <p class="modal-hint">Enter the base URL of an Ollama API server on your network.</p>
        <label class="field-label" for="source-url">Ollama API URL</label>
        <input
          id="source-url"
          class="text-input"
          type="text"
          placeholder="http://192.168.1.x:11434"
          autocomplete="off"
          spellcheck="false"
        />
        <p id="modal-error" class="modal-error hidden"></p>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn-secondary">Cancel</button>
          <button id="modal-confirm" class="btn-primary">Connect</button>
        </div>
      </div>
    </div>

    <!--
      Script order matters:
        1. shared.js            — createPanel, el, clampText, apiJson, proxyFetch, notifications
        2. markdown.js          — renderMarkdown() global, no dependencies
        3. inference-policy.js  — shared Gemma/Ollama prompt policy helpers
        4. sources.js           — inference source state, CRUD, card rendering
        5. chat.js              — chat UI, depends on renderMarkdown + app.js globals
        6. pipeline.js          — multiphase lab UI, depends on renderMarkdown + app.js globals
        7. app.js               — panels, calls sourcesInit() + chatInit() + pipelineInit() at end of init()
    -->
    <script src="shared.js"></script>
    <script src="markdown.js"></script>
    <script src="inference-policy.js"></script>
    <script src="sources.js"></script>
    <script src="chat.js"></script>
    <script src="pipeline.js"></script>
    <script src="app.js"></script>
  </body>
</html>
