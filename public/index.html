<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrgChart</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="header-title">
          <span class="header-logo" aria-hidden="true"></span>
          <h1>OrgChart</h1>
        </div>
        <p class="header-sub">Paper Dolls for Corporate Theater</p>
        <button id="theme-toggle" class="btn-theme" aria-label="Toggle theme"></button>
      </div>
    </header>

    <div class="app-shell">
      <!-- Navigation rail — built by nav.js mountNavigation() -->
      <nav class="app-nav" id="app-nav" aria-label="Main navigation"></nav>

      <main class="app-main" id="app-main">
        <!-- Presentation: live operations dashboard -->
        <section class="app-section" id="section-presentation" aria-label="Presentation"></section>

        <!-- Configuration: guided setup panels -->
        <section class="app-section" id="section-configuration" aria-label="Configuration">
          <div id="panel-sources-mount"></div>
          <div id="panel-persona-mount"></div>
          <div id="panel-skills-mount"></div>
          <div id="panel-tools-mount"></div>
          <div id="panel-management-mount"></div>
          <div id="panel-tasks-mount"></div>
          <div id="panel-projects-mount"></div>
        </section>

        <!-- Records: intranet records section -->
        <section class="app-section" id="section-records" aria-label="Records">
          <div id="panel-intranet-mount"></div>
        </section>

        <!-- Knowledge: intranet knowledge section (WS2.5: rendered from intranet-mod) -->
        <section class="app-section" id="section-knowledge" aria-label="Knowledge"></section>

        <!-- Technology: intranet technology section (WS2.5: rendered from intranet-mod) -->
        <section class="app-section" id="section-technology" aria-label="Technology"></section>

        <!-- Diagnostics: chat, meetings, pipeline -->
        <section class="app-section" id="section-diagnostics" aria-label="Diagnostics">
          <div id="panel-chat-mount"></div>
          <div id="panel-group-chat-mount"></div>
          <div id="panel-pipeline-mount"></div>
        </section>
      </main>
    </div>

    <!-- Add Source Modal (static HTML — toggled by app.js) -->
    <div id="add-modal" class="modal-backdrop hidden"
         role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal">
        <h3 id="modal-title" class="modal-title">Add Inference Source</h3>
        <p class="modal-hint">Enter the base URL of an Ollama API server on your network.</p>
        <label class="field-label" for="source-url">Ollama API URL</label>
        <input
          id="source-url"
          class="text-input"
          type="text"
          placeholder="http://192.168.1.x:11434"
          autocomplete="off"
          spellcheck="false"
        />
        <p id="modal-error" class="modal-error hidden"></p>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn-secondary">Cancel</button>
          <button id="modal-confirm" class="btn-primary">Connect</button>
        </div>
      </div>
    </div>

    <!--
      Script order matters:
        1. shared.js            — createPanel, el, clampText, apiJson, proxyFetch, notifications
        2. markdown.js          — renderMarkdown() global, no dependencies
        3. inference-policy.js  — shared Gemma/Ollama prompt policy helpers
        4. sources.js           — inference source state, CRUD, card rendering
        5. agents.js            — agent/persona state, CRUD, editor, instruction drafting
        6. skills.js            — skills state, CRUD, panel rendering
        7. tools.js             — tools state, CRUD, panel rendering
        8. management.js        — organization, department, team, and role management
        9. intranet-mod.js      — intranet documents and custom tools panel
       10. tasks-mod.js         — scheduled tasks state, CRUD, scheduler, panel rendering
       11. meetings.js          — group chat, meetings, facilitator, draft boards, inference queue
       12. chat.js              — chat UI, depends on renderMarkdown + app.js globals
       13. pipeline.js          — multiphase lab UI, depends on renderMarkdown + app.js globals
       14. nav.js               — navigation rail controller, navigateTo(), mountNavigation()
       15. config-flow.js       — guided 10-step configuration checklist
       16. presentation.js      — operations dashboard for Presentation section
       17. projects.js          — project & milestone tracking, projectsInit()
       18. app.js               — panels, calls sourcesInit() + chatInit() + pipelineInit() + mountNavigation() at end of init()
    -->
    <script src="shared.js"></script>
    <script src="markdown.js"></script>
    <script src="inference-policy.js"></script>
    <script src="sources.js"></script>
    <script src="agents.js"></script>
    <script src="skills.js"></script>
    <script src="tools.js"></script>
    <script src="management.js"></script>
    <script src="intranet-mod.js"></script>
    <script src="tasks-mod.js"></script>
    <script src="meetings.js"></script>
    <script src="chat.js"></script>
    <script src="pipeline.js"></script>
    <script src="nav.js"></script>
    <script src="config-flow.js"></script>
    <script src="presentation.js"></script>
    <script src="projects.js"></script>
    <script src="app.js"></script>
  </body>
</html>
